# GitHub Actions CI — scaffolded by Claude OS nextjs-supabase stack
# Copy to .github/workflows/ci.yml in your project

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # Gate: Lint (0 errors)
      - name: Lint
        run: npm run lint

      # Gate: Type check (0 errors)
      - name: Type check
        run: npx tsc --noEmit

      # Gate: Tests pass
      - name: Unit tests
        run: npx vitest run --reporter=verbose

      # Gate: Build succeeds
      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npx playwright test
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  pr-gates:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Gate: PR size under 400 lines (excluding lock files, migrations)
      - name: PR size check
        run: |
          LINES=$(git diff --stat origin/main...HEAD -- . \
            ':!package-lock.json' ':!pnpm-lock.yaml' \
            ':!*.generated.*' ':!supabase/migrations/**' \
            | tail -1 | awk '{print $4+$6}')
          if [ "${LINES:-0}" -gt 400 ]; then
            echo "::error::PR is ${LINES:-0} lines (max 400). Consider splitting."
            exit 1
          fi
          echo "PR size: ${LINES:-0} lines — OK"

      # Gate: No secrets in diff
      - name: Secret scan
        run: |
          PATTERNS='sk_live_|sk_test_|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36}|-----BEGIN.PRIVATE.KEY'
          DIFF=$(git diff origin/main...HEAD -- . ':!*.lock' ':!*.png' ':!*.jpg' ':!*.md')
          if echo "$DIFF" | grep -qE "$PATTERNS"; then
            echo "::error::Potential secret detected in PR diff"
            exit 1
          fi

      # Gate: Conventional commit format
      - name: Commit format
        run: |
          PATTERN='^(feat|fix|docs|refactor|test|chore|ci|style|perf)(\([a-z0-9A-Z_-]+\))?: [a-z]'
          INVALID=""
          while IFS= read -r msg; do
            if ! echo "$msg" | grep -qE "$PATTERN" && ! echo "$msg" | grep -qE '^Merge '; then
              INVALID="${INVALID}\n  - $msg"
            fi
          done < <(git log --format='%s' origin/main..HEAD)
          if [ -n "$INVALID" ]; then
            echo "::error::Non-conventional commits:${INVALID}"
            exit 1
          fi
